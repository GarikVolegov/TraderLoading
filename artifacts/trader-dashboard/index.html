<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Fonts: loaded from <head> with preconnect instead of a render-blocking
         CSS @import chain (CSS → font CSS → font files). display=swap keeps
         text visible while fonts load. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700&family=Fira+Sans:wght@400;500;600;700&display=swap" />

    <!-- ─── SEO ──────────────────────────────────────────────────────── -->
    <title>TraderLoading — Trading Journal, Macro News & Risk Discipline</title>
    <meta name="description" content="All-in-one trading workspace: auto-synced trading journal with FX Blue, real-time macro news, risk management, economic calendar, backtesting and gamified discipline routines. Free to start." />
    <meta name="keywords" content="TraderLoading, trader loading, trading journal, backtesting, macro news, macroeconomics, trading analysis, risk management, economic calendar, forex journal, trading, finance" />
    <link rel="canonical" href="https://traderloading.com/" />
    <meta name="robots" content="index, follow, max-image-preview:large" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="TraderLoading" />
    <meta property="og:title" content="TraderLoading — Trade Smarter, Not Harder" />
    <meta property="og:description" content="Journal your trades, track macro news, manage risk and level up your trading discipline every single day." />
    <meta property="og:url" content="https://traderloading.com/" />
    <meta property="og:image" content="https://traderloading.com/opengraph.jpg" />
    <meta property="og:image:width" content="1280" />
    <meta property="og:image:height" content="720" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="TraderLoading — Trade Smarter, Not Harder" />
    <meta name="twitter:description" content="Auto-synced trading journal, macro news intelligence, risk tools and discipline routines in one workspace." />
    <meta name="twitter:image" content="https://traderloading.com/opengraph.jpg" />

    <!-- Structured data (Schema.org) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "TraderLoading",
      "url": "https://traderloading.com/",
      "description": "All-in-one trading workspace: auto-synced trading journal, real-time macro news, risk management tools, economic calendar, chart backtesting and gamified discipline routines for retail traders.",
      "applicationCategory": "FinanceApplication",
      "operatingSystem": "Web",
      "offers": [
        { "@type": "Offer", "price": "0", "priceCurrency": "EUR", "name": "Free" },
        { "@type": "Offer", "price": "7", "priceCurrency": "EUR", "name": "Pro" }
      ],
      "featureList": [
        "Trading journal with automatic FX Blue account sync",
        "Real-time macro news with asset impact analysis",
        "Account equity curve and P&L calendar",
        "Economic calendar and COT report",
        "Chart replay backtesting",
        "Risk management and position sizing tools",
        "Mood-performance insights and discipline routines"
      ],
      "inLanguage": ["en", "it", "es", "fr", "de"],
      "publisher": {
        "@type": "Organization",
        "name": "TraderLoading",
        "url": "https://traderloading.com/",
        "contactPoint": {
          "@type": "ContactPoint",
          "contactType": "customer support",
          "email": "assistenza@traderloading.com"
        }
      }
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "TraderLoading",
      "url": "https://traderloading.com/",
      "logo": "https://traderloading.com/app-icon.png",
      "description": "TraderLoading is the all-in-one trading workspace: automated trading journal, real-time macro news, chart-replay backtesting and risk management tools for retail traders.",
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer support",
        "email": "assistenza@traderloading.com"
      }
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "TraderLoading",
      "url": "https://traderloading.com/",
      "inLanguage": ["en", "it", "es", "fr", "de"],
      "publisher": { "@type": "Organization", "name": "TraderLoading", "url": "https://traderloading.com/" }
    }
    </script>
    <link rel="manifest" href="/manifest.json?v=2" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg?v=2" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png?v=2" />
    <link rel="shortcut icon" href="/favicon.ico?v=2" />
    <link rel="icon" type="image/png" sizes="1024x1024" href="/app-icon.png?v=2" />
    <link rel="icon" type="image/png" sizes="192x192" href="/app-icon-192.png?v=2" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=2" />
    <meta name="theme-color" content="#0a0e27" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="TraderLoading" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root">
      <!-- Pre-React brand splash (replaced when the app mounts) -->
      <style>@keyframes tl-splash{0%,100%{opacity:.6;transform:translateY(0)}50%{opacity:1;transform:translateY(-6px)}}</style>
      <div id="app-splash" aria-hidden="true" style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#0a0e27;">
        <svg width="76" height="76" viewBox="0 0 24 24" fill="none" stroke="#51a488" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" style="filter:drop-shadow(0 0 14px rgba(81,164,136,.45));animation:tl-splash 1.6s ease-in-out infinite">
          <path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"/>
          <path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"/>
          <path d="M9 12H4s.55-3.03 2-4c1.62-1.08 5 0 5 0"/>
          <path d="M12 15v5s3.03-.55 4-2c1.08-1.62 0-5 0-5"/>
        </svg>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
