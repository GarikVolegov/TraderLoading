        "Risk management and position sizing tools",
        "Mood-performance insights and discipline routines"
      ],
      "inLanguage": ["en", "it", "es", "fr", "de"],
      "publisher": {
        "@type": "Organization",
        "name": "TraderLoading",
        "url": "https://traderloading.com/",
        "contactPoint": {
          "@type": "ContactPoint",
          "contactType": "customer support",
