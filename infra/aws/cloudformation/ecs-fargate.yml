AWSTemplateFormatVersion: "2010-09-09"
Description: TraderLoadings production service on ECS Fargate with ALB, Secrets Manager, logs, and autoscaling.

Parameters:
  AppName:
    Type: String
    Default: traderloadings
  ContainerImage:
    Type: String
    Description: ECR image URI, for example 123456789012.dkr.ecr.eu-west-1.amazonaws.com/traderloadings:latest
  VpcId:
    Type: AWS::EC2::VPC::Id
  PublicSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
  PrivateSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
  AlbIngressCidr:
    Type: String
    Default: 0.0.0.0/0
  DesiredCount:
    Type: Number
    Default: 2
    MinValue: 1
  MinTaskCount:
    Type: Number
    Default: 2
    MinValue: 1
  MaxTaskCount:
    Type: Number
    Default: 6
    MinValue: 1
  TaskCpu:
    Type: String
    Default: "1024"
    AllowedValues: ["512", "1024", "2048", "4096"]
  TaskMemory:
    Type: String
    Default: "2048"
    AllowedValues: ["1024", "2048", "3072", "4096", "8192"]
  ApiCorsOrigins:
    Type: String
    Description: Comma-separated production origins allowed by the API.
  ViteApiBase:
    Type: String
    Default: ""
  ViteClerkPublishableKey:
    Type: String
    NoEcho: true
  AppSecretJson:
    Type: String
    NoEcho: true
    Description: JSON with DATABASE_URL, CLERK_SECRET_KEY, BROKER_VAULT_KEY, VAPID keys, and provider API keys.

Resources:
  AppSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub /${AppName}/production/app
      SecretString: !Ref AppSecretJson

  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /ecs/${AppName}
      RetentionInDays: 30

  Cluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub ${AppName}-cluster
      ClusterSettings:
        - Name: ContainerInsights
          Value: enabled

  ExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: ReadAppSecrets
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Ref AppSecret

  TaskRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole

  AlbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub ${AppName} ALB ingress
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: !Ref AlbIngressCidr
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  ServiceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub ${AppName} ECS service ingress from ALB
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3001
          ToPort: 3001
          SourceSecurityGroupId: !Ref AlbSecurityGroup
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  LoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub ${AppName}-alb
      Scheme: internet-facing
      Type: application
      SecurityGroups:
        - !Ref AlbSecurityGroup
      Subnets: !Ref PublicSubnetIds

  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub ${AppName}-tg
      VpcId: !Ref VpcId
      TargetType: ip
      Protocol: HTTP
      Port: 3001
      HealthCheckPath: /api/healthz
      HealthCheckProtocol: HTTP
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3

  Listener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref LoadBalancer
      Protocol: HTTP
      Port: 80
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup

  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub ${AppName}-api
      RequiresCompatibilities:
        - FARGATE
      NetworkMode: awsvpc
      Cpu: !Ref TaskCpu
      Memory: !Ref TaskMemory
      ExecutionRoleArn: !GetAtt ExecutionRole.Arn
      TaskRoleArn: !GetAtt TaskRole.Arn
      ContainerDefinitions:
        - Name: app
          Image: !Ref ContainerImage
          Essential: true
          PortMappings:
            - ContainerPort: 3001
              Protocol: tcp
          Environment:
            - Name: NODE_ENV
              Value: production
            - Name: PORT
              Value: "3001"
            - Name: TRUST_PROXY
              Value: "1"
            - Name: API_CORS_ORIGINS
              Value: !Ref ApiCorsOrigins
            - Name: VITE_API_BASE
              Value: !Ref ViteApiBase
            - Name: VITE_CLERK_PUBLISHABLE_KEY
              Value: !Ref ViteClerkPublishableKey
            - Name: FRONTEND_DIST_DIR
              Value: /app/artifacts/trader-dashboard/dist/public
            - Name: PGPOOL_MAX
              Value: "10"
            - Name: PG_IDLE_TIMEOUT_MS
              Value: "30000"
            - Name: PG_CONNECTION_TIMEOUT_MS
              Value: "5000"
            - Name: PGSSLMODE
              Value: require
          Secrets:
            - Name: DATABASE_URL
              ValueFrom: !Sub "${AppSecret}:DATABASE_URL::"
            - Name: CLERK_SECRET_KEY
              ValueFrom: !Sub "${AppSecret}:CLERK_SECRET_KEY::"
            - Name: BROKER_VAULT_KEY
              ValueFrom: !Sub "${AppSecret}:BROKER_VAULT_KEY::"
            - Name: VAPID_PUBLIC_KEY
              ValueFrom: !Sub "${AppSecret}:VAPID_PUBLIC_KEY::"
            - Name: VAPID_PRIVATE_KEY
              ValueFrom: !Sub "${AppSecret}:VAPID_PRIVATE_KEY::"
            - Name: VAPID_EMAIL
              ValueFrom: !Sub "${AppSecret}:VAPID_EMAIL::"
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: app
          HealthCheck:
            Command:
              - CMD-SHELL
              - node -e "fetch('http://127.0.0.1:3001/api/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
            Interval: 30
            Timeout: 5
            Retries: 3
            StartPeriod: 60

  Service:
    Type: AWS::ECS::Service
    DependsOn: Listener
    Properties:
      ServiceName: !Sub ${AppName}-service
      Cluster: !Ref Cluster
      TaskDefinition: !Ref TaskDefinition
      DesiredCount: !Ref DesiredCount
      LaunchType: FARGATE
      DeploymentConfiguration:
        MinimumHealthyPercent: 100
        MaximumPercent: 200
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          SecurityGroups:
            - !Ref ServiceSecurityGroup
          Subnets: !Ref PrivateSubnetIds
      LoadBalancers:
        - ContainerName: app
          ContainerPort: 3001
          TargetGroupArn: !Ref TargetGroup

  ServiceScalableTarget:
    Type: AWS::ApplicationAutoScaling::ScalableTarget
    Properties:
      MaxCapacity: !Ref MaxTaskCount
      MinCapacity: !Ref MinTaskCount
      ResourceId: !Sub service/${Cluster}/${Service.Name}
      RoleARN: !Sub arn:aws:iam::${AWS::AccountId}:role/aws-service-role/ecs.application-autoscaling.amazonaws.com/AWSServiceRoleForApplicationAutoScaling_ECSService
      ScalableDimension: ecs:service:DesiredCount
      ServiceNamespace: ecs

  CpuScalingPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: !Sub ${AppName}-cpu-target
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref ServiceScalableTarget
      TargetTrackingScalingPolicyConfiguration:
        TargetValue: 65
        ScaleInCooldown: 120
        ScaleOutCooldown: 60
        PredefinedMetricSpecification:
          PredefinedMetricType: ECSServiceAverageCPUUtilization

Outputs:
  LoadBalancerDnsName:
    Description: Public DNS name for the application load balancer.
    Value: !GetAtt LoadBalancer.DNSName
  ClusterName:
    Value: !Ref Cluster
  ServiceName:
    Value: !GetAtt Service.Name
  SecretArn:
    Value: !Ref AppSecret
