AWSTemplateFormatVersion: "2010-09-09"
Description: TraderLoadings production service on ECS Fargate with ALB, Secrets Manager, logs, and autoscaling.

Parameters:
  AppName:
    Type: String
    Default: traderloadings
    MaxLength: 22
    AllowedPattern: "^[a-zA-Z][a-zA-Z0-9-]*$"
  ContainerImage:
    Type: String
    Description: Immutable ECR image URI, preferably a release tag or digest.
  VpcId:
    Type: AWS::EC2::VPC::Id
  PublicSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
  PrivateSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
  AlbIngressCidr:
    Type: String
    Default: 0.0.0.0/0
  AcmCertificateArn:
    Type: String
    Default: ""
    Description: Optional ACM certificate ARN. When set, the ALB serves HTTPS on 443 and redirects HTTP to HTTPS.
  DesiredCount:
    Type: Number
    Default: 2
    MinValue: 1
  MinTaskCount:
    Type: Number
    Default: 2
    MinValue: 1
  MaxTaskCount:
    Type: Number
    Default: 6
    MinValue: 1
  TaskCpu:
    Type: String
    Default: "1024"
    AllowedValues: ["512", "1024", "2048", "4096"]
  TaskMemory:
    Type: String
    Default: "2048"
    AllowedValues: ["1024", "2048", "3072", "4096", "8192"]
  RedisCacheNodeType:
    Type: String
    Default: cache.t4g.micro
    Description: ElastiCache Redis node type for distributed application cache.
  ApiCorsOrigins:
    Type: String
    Description: Comma-separated production origins allowed by the API.
  ViteApiBase:
    Type: String
    Default: ""
  AppBaseUrl:
    Type: String
    Description: Public application URL used for Stripe Checkout return URLs.
  ViteClerkPublishableKey:
    Type: String
    NoEcho: true
  SentryDsn:
    Type: String
    Default: ""
    NoEcho: true
  AlarmEmail:
    Type: String
    Default: ""
    Description: Optional email address subscribed to critical CloudWatch alarms.
  AppSecretJson:
    Type: String
    NoEcho: true
    Description: JSON with DATABASE_URL, CLERK_SECRET_KEY, BROKER_VAULT_KEY, VAPID keys, Stripe keys, and provider API keys.
  IngestTaskCpu:
    Type: String
    Default: "1024"
    AllowedValues: ["512", "1024", "2048", "4096"]
    Description: CPU units for the candle warehouse ingestion task.
  IngestTaskMemory:
    Type: String
    Default: "4096"
    AllowedValues: ["1024", "2048", "3072", "4096", "8192"]
    Description: Memory (MiB) for the ingestion task; the seed buffers ~one month of M1 bars per chunk.
  IngestScheduleExpression:
    Type: String
    Default: "cron(0 2 * * ? *)"
    Description: EventBridge Scheduler expression for the nightly tail (default 02:00 UTC).
  IngestScheduleState:
    Type: String
    Default: ENABLED
    AllowedValues: [ENABLED, DISABLED]
    Description: Toggle the nightly tail schedule on or off.

Conditions:
  HasAcmCertificate: !Not [!Equals [!Ref AcmCertificateArn, ""]]
  HasAlarmEmail: !Not [!Equals [!Ref AlarmEmail, ""]]

Resources:
  AppSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub /${AppName}/production/app
      SecretString: !Ref AppSecretJson

  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /ecs/${AppName}
      RetentionInDays: 30

  Cluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub ${AppName}-cluster
      ClusterSettings:
        - Name: ContainerInsights
          Value: enabled

  ExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: ReadAppSecrets
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Ref AppSecret

  TaskRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: UseUploadsFileSystem
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - elasticfilesystem:ClientMount
                  - elasticfilesystem:ClientWrite
                Resource: !Sub arn:${AWS::Partition}:elasticfilesystem:${AWS::Region}:${AWS::AccountId}:file-system/${UploadsFileSystem}
                Condition:
                  StringEquals:
                    "elasticfilesystem:AccessPointArn": !GetAtt UploadsAccessPoint.Arn

  AlbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub ${AppName} ALB ingress
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: !Ref AlbIngressCidr
        - !If
          - HasAcmCertificate
          - IpProtocol: tcp
            FromPort: 443
            ToPort: 443
            CidrIp: !Ref AlbIngressCidr
          - !Ref AWS::NoValue
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  ServiceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub ${AppName} ECS service ingress from ALB
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3001
          ToPort: 3001
          SourceSecurityGroupId: !Ref AlbSecurityGroup
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  EfsSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub ${AppName} EFS ingress from ECS service
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          SourceSecurityGroupId: !Ref ServiceSecurityGroup
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  RedisSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub ${AppName} Redis ingress from ECS service
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 6379
          ToPort: 6379
          SourceSecurityGroupId: !Ref ServiceSecurityGroup
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  RedisSubnetGroup:
    Type: AWS::ElastiCache::SubnetGroup
    Properties:
      Description: !Sub ${AppName} Redis private subnets
      SubnetIds: !Ref PrivateSubnetIds

  RedisReplicationGroup:
    Type: AWS::ElastiCache::ReplicationGroup
    Properties:
      ReplicationGroupDescription: !Sub ${AppName} distributed application cache
      Engine: redis
      CacheNodeType: !Ref RedisCacheNodeType
      CacheSubnetGroupName: !Ref RedisSubnetGroup
      SecurityGroupIds:
        - !Ref RedisSecurityGroup
      NumCacheClusters: 2
      AutomaticFailoverEnabled: true
      MultiAZEnabled: true
      AtRestEncryptionEnabled: true
      TransitEncryptionEnabled: true

  UploadsFileSystem:
    Type: AWS::EFS::FileSystem
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Encrypted: true
      BackupPolicy:
        Status: ENABLED
      LifecyclePolicies:
        - TransitionToIA: AFTER_30_DAYS
      FileSystemTags:
        - Key: Name
          Value: !Sub ${AppName}-uploads

  UploadsAccessPoint:
    Type: AWS::EFS::AccessPoint
    Properties:
      FileSystemId: !Ref UploadsFileSystem
      PosixUser:
        Uid: "10001"
        Gid: "10001"
      RootDirectory:
        Path: /uploads
        CreationInfo:
          OwnerUid: "10001"
          OwnerGid: "10001"
          Permissions: "0770"

  UploadsMountTargetA:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref UploadsFileSystem
      SubnetId: !Select [0, !Ref PrivateSubnetIds]
      SecurityGroups:
        - !Ref EfsSecurityGroup

  UploadsMountTargetB:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref UploadsFileSystem
      SubnetId: !Select [1, !Ref PrivateSubnetIds]
      SecurityGroups:
        - !Ref EfsSecurityGroup

  LoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub ${AppName}-alb
      Scheme: internet-facing
      Type: application
      SecurityGroups:
        - !Ref AlbSecurityGroup
      Subnets: !Ref PublicSubnetIds

  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub ${AppName}-tg
      VpcId: !Ref VpcId
      TargetType: ip
      Protocol: HTTP
      Port: 3001
      HealthCheckPath: /api/readyz
      HealthCheckProtocol: HTTP
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3

  Listener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref LoadBalancer
      Protocol: HTTP
      Port: 80
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup

  HttpRedirectRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Condition: HasAcmCertificate
    Properties:
      ListenerArn: !Ref Listener
      Priority: 1
      Conditions:
        - Field: path-pattern
          Values:
            - /*
      Actions:
        - Type: redirect
          RedirectConfig:
            Protocol: HTTPS
            Port: "443"
            StatusCode: HTTP_301

  HttpsListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Condition: HasAcmCertificate
    Properties:
      LoadBalancerArn: !Ref LoadBalancer
      Protocol: HTTPS
      Port: 443
      SecurityPolicy: ELBSecurityPolicy-TLS13-1-2-2021-06
      Certificates:
        - CertificateArn: !Ref AcmCertificateArn
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup

  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub ${AppName}-api
      RequiresCompatibilities:
        - FARGATE
      NetworkMode: awsvpc
      Cpu: !Ref TaskCpu
      Memory: !Ref TaskMemory
      ExecutionRoleArn: !GetAtt ExecutionRole.Arn
      TaskRoleArn: !GetAtt TaskRole.Arn
      ContainerDefinitions:
        - Name: app
          Image: !Ref ContainerImage
          Essential: true
          PortMappings:
            - ContainerPort: 3001
              Protocol: tcp
          Environment:
            - Name: NODE_ENV
              Value: production
            - Name: APP_VERSION
              Value: !Ref ContainerImage
            - Name: PORT
              Value: "3001"
            - Name: TRUST_PROXY
              Value: "1"
            - Name: API_CORS_ORIGINS
              Value: !Ref ApiCorsOrigins
            - Name: VITE_API_BASE
              Value: !Ref ViteApiBase
            - Name: APP_BASE_URL
              Value: !Ref AppBaseUrl
            - Name: VITE_CLERK_PUBLISHABLE_KEY
              Value: !Ref ViteClerkPublishableKey
            - Name: FRONTEND_DIST_DIR
              Value: /app/artifacts/trader-dashboard/dist/public
            - Name: UPLOADS_DIR
              Value: /app/uploads
            - Name: PGPOOL_MAX
              Value: "4"
            - Name: PG_IDLE_TIMEOUT_MS
              Value: "30000"
            - Name: PG_CONNECTION_TIMEOUT_MS
              Value: "5000"
            - Name: PGSSLMODE
              Value: require
            - Name: SENTRY_ENVIRONMENT
              Value: production
            - Name: SENTRY_DSN
              Value: !Ref SentryDsn
            - Name: SENTRY_TRACES_SAMPLE_RATE
              Value: "0.05"
            - Name: DD_SERVICE
              Value: !Sub ${AppName}-api
            - Name: NEW_RELIC_APP_NAME
              Value: !Sub ${AppName} API
            - Name: REDIS_URL
              Value: !Sub rediss://${RedisReplicationGroup.PrimaryEndPoint.Address}:6379
          Secrets:
            - Name: DATABASE_URL
              ValueFrom: !Sub "${AppSecret}:DATABASE_URL::"
            - Name: CLERK_SECRET_KEY
              ValueFrom: !Sub "${AppSecret}:CLERK_SECRET_KEY::"
            - Name: BROKER_VAULT_KEY
              ValueFrom: !Sub "${AppSecret}:BROKER_VAULT_KEY::"
            - Name: VAPID_PUBLIC_KEY
              ValueFrom: !Sub "${AppSecret}:VAPID_PUBLIC_KEY::"
            - Name: VAPID_PRIVATE_KEY
              ValueFrom: !Sub "${AppSecret}:VAPID_PRIVATE_KEY::"
            - Name: VAPID_EMAIL
              ValueFrom: !Sub "${AppSecret}:VAPID_EMAIL::"
            - Name: STRIPE_SECRET_KEY
              ValueFrom: !Sub "${AppSecret}:STRIPE_SECRET_KEY::"
            - Name: STRIPE_WEBHOOK_SECRET
              ValueFrom: !Sub "${AppSecret}:STRIPE_WEBHOOK_SECRET::"
            - Name: STRIPE_PRO_MONTHLY_PRICE_ID
              ValueFrom: !Sub "${AppSecret}:STRIPE_PRO_MONTHLY_PRICE_ID::"
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: app
          HealthCheck:
            Command:
              - CMD-SHELL
              - node -e "fetch('http://127.0.0.1:3001/api/readyz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
            Interval: 30
            Timeout: 5
            Retries: 3
            StartPeriod: 60
          MountPoints:
            - SourceVolume: uploads
              ContainerPath: /app/uploads
              ReadOnly: false
      Volumes:
        - Name: uploads
          EFSVolumeConfiguration:
            FilesystemId: !Ref UploadsFileSystem
            TransitEncryption: ENABLED
            AuthorizationConfig:
              AccessPointId: !Ref UploadsAccessPoint
              IAM: ENABLED

  Service:
    Type: AWS::ECS::Service
    DependsOn:
      - Listener
      - UploadsMountTargetA
      - UploadsMountTargetB
    Properties:
      ServiceName: !Sub ${AppName}-service
      Cluster: !Ref Cluster
      TaskDefinition: !Ref TaskDefinition
      DesiredCount: !Ref DesiredCount
      LaunchType: FARGATE
      DeploymentConfiguration:
        MinimumHealthyPercent: 100
        MaximumPercent: 200
        DeploymentCircuitBreaker:
          Enable: true
          Rollback: true
      HealthCheckGracePeriodSeconds: 90
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          SecurityGroups:
            - !Ref ServiceSecurityGroup
          Subnets: !Ref PrivateSubnetIds
      LoadBalancers:
        - ContainerName: app
          ContainerPort: 3001
          TargetGroupArn: !Ref TargetGroup

  ServiceScalableTarget:
    Type: AWS::ApplicationAutoScaling::ScalableTarget
    Properties:
      MaxCapacity: !Ref MaxTaskCount
      MinCapacity: !Ref MinTaskCount
      ResourceId: !Sub service/${Cluster}/${Service.Name}
      ScalableDimension: ecs:service:DesiredCount
      ServiceNamespace: ecs

  CpuScalingPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: !Sub ${AppName}-cpu-target
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref ServiceScalableTarget
      TargetTrackingScalingPolicyConfiguration:
        TargetValue: 65
        ScaleInCooldown: 120
        ScaleOutCooldown: 60
        PredefinedMetricSpecification:
          PredefinedMetricType: ECSServiceAverageCPUUtilization

  AlarmTopic:
    Type: AWS::SNS::Topic
    Condition: HasAlarmEmail
    Properties:
      TopicName: !Sub ${AppName}-production-alarms
      DisplayName: !Sub ${AppName} production alarms

  AlarmSubscription:
    Type: AWS::SNS::Subscription
    Condition: HasAlarmEmail
    Properties:
      TopicArn: !Ref AlarmTopic
      Protocol: email
      Endpoint: !Ref AlarmEmail

  AlbTarget5xxAlarm:
    Type: AWS::CloudWatch::Alarm
    Condition: HasAlarmEmail
    Properties:
      AlarmName: !Sub ${AppName}-alb-target-5xx
      AlarmDescription: !Sub ${AppName} target group returned too many 5xx responses.
      Namespace: AWS/ApplicationELB
      MetricName: HTTPCode_Target_5XX_Count
      Dimensions:
        - Name: LoadBalancer
          Value: !GetAtt LoadBalancer.LoadBalancerFullName
        - Name: TargetGroup
          Value: !GetAtt TargetGroup.TargetGroupFullName
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 5
      DatapointsToAlarm: 3
      Threshold: 5
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlarmTopic
      OKActions:
        - !Ref AlarmTopic

  EcsCpuHighAlarm:
    Type: AWS::CloudWatch::Alarm
    Condition: HasAlarmEmail
    Properties:
      AlarmName: !Sub ${AppName}-ecs-cpu-high
      AlarmDescription: !Sub ${AppName} ECS service CPU stayed above 80 percent.
      Namespace: AWS/ECS
      MetricName: CPUUtilization
      Dimensions:
        - Name: ClusterName
          Value: !Ref Cluster
        - Name: ServiceName
          Value: !GetAtt Service.Name
      Statistic: Average
      Period: 60
      EvaluationPeriods: 5
      DatapointsToAlarm: 3
      Threshold: 80
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlarmTopic
      OKActions:
        - !Ref AlarmTopic

  # ─── Candle warehouse ingestion ───────────────────────────────────────────
  # A standalone Fargate task (same image, different command) backfills/keeps the
  # candle warehouse fresh. It runs in the private subnets and reaches Dukascopy/
  # Binance via the same NAT egress the service already uses. NOTE: untested infra
  # — review before deploying.
  IngestTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub ${AppName}-ingest
      RequiresCompatibilities:
        - FARGATE
      NetworkMode: awsvpc
      Cpu: !Ref IngestTaskCpu
      Memory: !Ref IngestTaskMemory
      ExecutionRoleArn: !GetAtt ExecutionRole.Arn
      ContainerDefinitions:
        - Name: ingest
          Image: !Ref ContainerImage
          Essential: true
          # Default command is the nightly tail; the one-shot seed overrides this
          # via `aws ecs run-task --overrides` (see the SeedTaskCommand output).
          Command:
            - node
            - ./dist/ingest.cjs
            - tail
          Environment:
            - Name: NODE_ENV
              Value: production
            - Name: APP_VERSION
              Value: !Ref ContainerImage
            - Name: CANDLE_WAREHOUSE
              Value: "1"
            - Name: PGSSLMODE
              Value: require
            - Name: PGPOOL_MAX
              Value: "4"
            - Name: PG_CONNECTION_TIMEOUT_MS
              Value: "10000"
            - Name: SENTRY_ENVIRONMENT
              Value: production
            - Name: SENTRY_DSN
              Value: !Ref SentryDsn
          Secrets:
            - Name: DATABASE_URL
              ValueFrom: !Sub "${AppSecret}:DATABASE_URL::"
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: ingest

  IngestSchedulerRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: scheduler.amazonaws.com
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId
      Policies:
        - PolicyName: RunIngestTask
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: ecs:RunTask
                Resource: !Sub arn:${AWS::Partition}:ecs:${AWS::Region}:${AWS::AccountId}:task-definition/${AppName}-ingest:*
                Condition:
                  ArnEquals:
                    ecs:cluster: !GetAtt Cluster.Arn
              - Effect: Allow
                Action: iam:PassRole
                Resource: !GetAtt ExecutionRole.Arn
                Condition:
                  StringEquals:
                    iam:PassedToService: ecs-tasks.amazonaws.com

  IngestTailSchedule:
    Type: AWS::Scheduler::Schedule
    Properties:
      Name: !Sub ${AppName}-ingest-tail
      Description: Nightly candle warehouse tail ingestion.
      State: !Ref IngestScheduleState
      ScheduleExpression: !Ref IngestScheduleExpression
      ScheduleExpressionTimezone: UTC
      FlexibleTimeWindow:
        Mode: "OFF"
      Target:
        Arn: !GetAtt Cluster.Arn
        RoleArn: !GetAtt IngestSchedulerRole.Arn
        RetryPolicy:
          MaximumRetryAttempts: 2
        EcsParameters:
          TaskDefinitionArn: !Ref IngestTaskDefinition
          LaunchType: FARGATE
          TaskCount: 1
          NetworkConfiguration:
            AwsvpcConfiguration:
              AssignPublicIp: DISABLED
              SecurityGroups:
                - !Ref ServiceSecurityGroup
              Subnets: !Ref PrivateSubnetIds

Outputs:
  LoadBalancerDnsName:
    Description: Public DNS name for the application load balancer.
    Value: !GetAtt LoadBalancer.DNSName
  ClusterName:
    Value: !Ref Cluster
  ServiceName:
    Value: !GetAtt Service.Name
  SecretArn:
    Value: !Ref AppSecret
  RedisPrimaryEndpoint:
    Value: !GetAtt RedisReplicationGroup.PrimaryEndPoint.Address
  AlarmTopicArn:
    Condition: HasAlarmEmail
    Value: !Ref AlarmTopic
  IngestTaskDefinitionArn:
    Description: Candle ingestion task definition (runs `tail` by default).
    Value: !Ref IngestTaskDefinition
  SeedTaskCommand:
    Description: One-shot 5-year backfill — run once after deploy. Fill in <PRIVATE_SUBNET_IDS>.
    Value: !Sub >-
      aws ecs run-task --cluster ${Cluster}
      --task-definition ${AppName}-ingest --launch-type FARGATE
      --network-configuration "awsvpcConfiguration={subnets=[<PRIVATE_SUBNET_IDS>],securityGroups=[${ServiceSecurityGroup}],assignPublicIp=DISABLED}"
      --overrides '{"containerOverrides":[{"name":"ingest","command":["node","./dist/ingest.cjs","seed","--years=5"]}]}'
