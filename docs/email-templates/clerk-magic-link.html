<!doctype html>
<!--
  TraderLoading — Clerk "Magic link" email template (DARK).
  Paste into Clerk Dashboard → Customization → Emails → Magic link → HTML.
  Merge variables: {{magic_link}}, {{app.name}}. MSO-safe button (VML fallback).
-->
<html lang="it" xmlns:v="urn:schemas-microsoft-com:vml" xmlns:o="urn:schemas-microsoft-com:office:office">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="dark">
<meta name="supported-color-schemes" content="dark">
<title>{{app.name}}</title>
</head>
<body style="margin:0;padding:0;background:#0a0c10;color:#f3f5f7;">
<table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" bgcolor="#0a0c10" style="background:#0a0c10;">
  <tr>
    <td align="center" style="padding:32px 16px;">
      <table role="presentation" width="600" cellspacing="0" cellpadding="0" border="0" style="width:600px;max-width:600px;">
        <tr>
          <td align="left" style="padding:0 8px 20px;">
            <img src="https://traderloading.com/app-icon-192.png" width="40" height="40" alt="{{app.name}}" style="display:block;border:0;border-radius:9px;">
          </td>
        </tr>
        <tr>
          <td style="background:#13161b;border:1px solid #2d3139;border-radius:14px;padding:32px;font-family:'Fira Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
            <h1 style="margin:0 0 16px;font-size:20px;line-height:1.3;font-weight:600;color:#f3f5f7;">Accedi a {{app.name}}</h1>
            <p style="margin:0 0 8px;font-size:15px;line-height:1.6;color:#9ca6b4;">Tocca il pulsante per accedere. Il link scade tra pochi minuti.</p>
            <table role="presentation" cellspacing="0" cellpadding="0" border="0" style="margin:24px 0;">
              <tr>
                <td align="center" bgcolor="#51a488" style="border-radius:10px;">
                  <!--[if mso]>
                  <v:roundrect xmlns:v="urn:schemas-microsoft-com:vml" href="{{magic_link}}" style="height:44px;v-text-anchor:middle;width:240px;" arcsize="22%" stroke="f" fillcolor="#51a488">
                  <w:anchorlock/>
                  <center style="color:#0a0c10;font-family:Arial,sans-serif;font-size:15px;font-weight:600;">Accedi</center>
                  </v:roundrect>
                  <![endif]-->
                  <!--[if !mso]><!-- -->
                  <a href="{{magic_link}}" style="display:inline-block;padding:12px 28px;border-radius:10px;background:#51a488;color:#0a0c10;font-family:'Fira Sans',Arial,sans-serif;font-size:15px;font-weight:600;text-decoration:none;">Accedi</a>
                  <!--<![endif]-->
                </td>
              </tr>
            </table>
            <p style="margin:0 0 0;font-size:13px;line-height:1.6;color:#677383;">Se non hai richiesto questo accesso, ignora questa email.</p>
          </td>
        </tr>
        <tr>
          <td style="padding:24px 8px 0;font-family:'Fira Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;font-size:12px;line-height:1.5;color:#9ca6b4;">
            {{app.name}} — Trading journal, macro news &amp; risk discipline
            <br>
            <span style="color:#2d3139;">&copy; {{app.name}}</span>
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>
</body>
</html>
